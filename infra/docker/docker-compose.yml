services:
  postgres:
    image: postgres:18
    container_name: repo-analyzer-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Expose to host for local dev tools (migrate CLI, pgAdmin). Remove in production.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 4

  api:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: repo_analyzer_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_PATH=/app/storage/repos
    volumes:
      - repo_storage:/app/storage
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
      args:
        - API_ORIGIN=${API_ORIGIN}
    container_name: repo_analyzer_web
    depends_on:
      - api
    environment:
      - API_ORIGIN=${API_ORIGIN}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  repo_storage:
