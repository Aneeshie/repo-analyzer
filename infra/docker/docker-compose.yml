services:
  postgres:
    image: postgres:18
    container_name: repo-analyzer-db
    environment:
      POSTGRES_USER: repo_user
      POSTGRES_PASSWORD: repo_pass
      POSTGRES_DB: repo_analyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repo_user"]
      interval: 10s
      timeout: 5s
      retries: 4

  api:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: repo_analyzer_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://repo_user:repo_pass@postgres:5432/repo_analyzer?sslmode=disable
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
      args:
        - API_ORIGIN=http://api:8080
    container_name: repo_analyzer_web
    depends_on:
      - api
    environment:
      - API_ORIGIN=http://api:8080
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
