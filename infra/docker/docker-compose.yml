services:
  postgres:
    image: postgres:18
    container_name: repo-analyzer-db
    environment:
      POSTGRES_USER: repo_user
      POSTGRES_PASSWORD: repo_pass
      POSTGRES_DB: repo_analyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repo_user"]
      interval: 10s
      timeout: 5s
      retries: 4

volumes:
  postgres_data:
