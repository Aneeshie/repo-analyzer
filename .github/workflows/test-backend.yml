name: Test Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Run Go Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: repo_user
          POSTGRES_PASSWORD: repo_pass
          POSTGRES_DB: repo_analyzer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U repo_user; do
            sleep 1
          done

      - name: Reset database schema
        run: |
          psql postgres://repo_user:repo_pass@localhost:5432/repo_analyzer_test -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

      - name: Run all migrations in order
        run: |
          migrate -path infra/migrations -database "postgres://repo_user:repo_pass@localhost:5432/repo_analyzer_test?sslmode=disable" up

      - name: Verify migrations applied
        run: |
          psql postgres://repo_user:repo_pass@localhost:5432/repo_analyzer_test -c "\dt"
          psql postgres://repo_user:repo_pass@localhost:5432/repo_analyzer_test -c "\d repos"

      - name: Run Go tests
        env:
          TEST_DATABASE_URL: postgres://repo_user:repo_pass@localhost:5432/repo_analyzer_test?sslmode=disable
        run: |
          cd apps/backend
          # Packages run in parallel by default; several tests TRUNCATE shared tables.
          # Run serially to avoid cross-package DB interference.
          go test ./... -v -count=1 -p 1
